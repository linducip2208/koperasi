[program:koperasi-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/koperasi/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/koperasi/storage/logs/worker.log
stopwaitsecs=3600

[program:koperasi-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/koperasi/artisan schedule:work
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/koperasi/storage/logs/scheduler.log
